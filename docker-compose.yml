networks:
  snark:
    name: snark
    driver: bridge

volumes:
  snark-postgres-data:
  snark-redis-data:

services:
  snark-postgres:
    image: postgres:16-alpine
    container_name: snark-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snark}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - snark-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-snark}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - dev
      - prod
    networks:
      - snark

  snark-redis-cache:
    image: redis:7-alpine
    container_name: snark-redis-cache
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - snark-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - dev
      - prod
    networks:
      - snark

  wit-dev:
    build: .
    container_name: snark
    ports:
      - "${WIT_PORT:-8100}:${INTERNAL_PORT:-8094}"
    volumes:
      - .:/app
    env_file:
      - ./.env
    depends_on:
      snark-postgres:
        condition: service_healthy
      snark-redis-cache:
        condition: service_healthy
    command: >
      sh -c "cd snark &&
             python manage.py migrate &&
             python manage.py seed_personas &&
             python manage.py runserver 0.0.0.0:$$INTERNAL_PORT"
    profiles:
      - dev
    networks:
      - snark

  wit-prod:
    build: .
    container_name: snark
    ports:
      - "${WIT_PORT:-8100}:${INTERNAL_PORT:-8094}"
    env_file:
      - ./.env
    depends_on:
      snark-postgres:
        condition: service_healthy
      snark-redis-cache:
        condition: service_healthy
    command: >
      sh -c "cd snark &&
             python manage.py migrate &&
             python manage.py seed_personas &&
             gunicorn base.wsgi:application --bind 0.0.0.0:$$INTERNAL_PORT
             --workers 2 --threads 2 --max-requests 1000 --max-requests-jitter 100"
    profiles:
      - prod
    networks:
      - snark
