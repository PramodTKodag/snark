# Pre-commit hooks mirroring the CI lint job, so contributors catch formatting
# and lint issues before pushing. Install with:
#   pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
