name: Bug Report
description: Report a bug in snark
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill out the fields below so it can be reproduced.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can the bug be reproduced?
      placeholder: |
        1. Call endpoint '...'
        2. With query params '...'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, stack traces, or response bodies.
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: Affected endpoint
      placeholder: /v1/wit/...
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: How are you running snark?
      placeholder: |
        - Deployment: Docker / local
        - Python version:
        - AI provider: groq / gemini / claude
    validations:
      required: false
