# Funding links for the snark project — renders a "Sponsor" button on the repo.
# Docs: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository
#
# NOTE: the `github` entry only renders once the account is enrolled in and
# approved for the GitHub Sponsors program (https://github.com/sponsors).

github: [PramodTKodag]

# Optional — uncomment any you set up accounts for. Buy Me a Coffee and Ko-fi
# are intentionally omitted: their payouts run through Stripe, which has no
# India payout support. Use `custom` for an India-friendly link (e.g. Razorpay
# or a UPI page) if GitHub Sponsors payout is unavailable.
# open_collective: your-collective-slug
# liberapay: your-liberapay-username
# polar: your-polar-username
# custom: ["https://your-razorpay-or-upi-page"]
