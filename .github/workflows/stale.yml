name: Close stale issues

# Gently keep the issue tracker tidy: warn after 60 days of inactivity, close
# 14 days later if still silent. Issues labelled pinned/security are exempt.
# Pull requests are not touched.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-label: stale
          exempt-issue-labels: pinned,security
          remove-issue-stale-when-updated: true
          stale-issue-message: >
            This issue has had no activity for 60 days and is now marked stale.
            It will be closed in 14 days if there is no further activity. Comment
            to keep it open, or it can be exempted with the `pinned` label.
          close-issue-message: >
            Closing this issue after 74 days of inactivity. Please comment to
            reopen if it is still relevant.
          operations-per-run: 100
